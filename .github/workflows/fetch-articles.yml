name: Fetch Fresh Articles

on:
  schedule:
    # Run every 6 hours (4 times per day)
    - cron: '0 */6 * * *'
  # Also allow manual triggering
  workflow_dispatch:

jobs:
  fetch-articles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Node.js version
        run: |
          echo "Node.js version:"
          node --version
          echo "NPM version:"
          npm --version

      - name: Install dependencies
        run: npm install

      - name: Debug fetch script
        run: |
          echo "First 10 lines of fetch-more-articles.js:"
          head -10 fetch-more-articles.js
          echo "Checking for uuid imports:"
          grep -n "uuid" fetch-more-articles.js || echo "No uuid imports found"

      - name: Fetch and store articles
        run: node fetch-more-articles.js
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EXPO_PUBLIC_OPENAI_API_KEY: ${{ secrets.EXPO_PUBLIC_OPENAI_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          SERPAPI_SECRET_KEY: ${{ secrets.SERPAPI_SECRET_KEY || '' }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}